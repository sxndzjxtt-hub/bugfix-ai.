<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugFix AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-wrapper">

<header class="top-bar">
  <div class="logo-mark">🐞 BugFix AI</div>
  <nav class="top-nav">
    <a href="#docs">Docs</a>
    <a href="#pricing">Pricing</a>
    <a href="#" onclick="openLogin()">Sign In</a>
  </nav>
</header>

<section class="hero">
  <h1 class="hero-title">
    Fix coding errors <br>
    <span class="gradient-text">instantly with AI</span>
  </h1>
</section>

<main class="card-scene">
<div class="glass-card">

<div class="card-top-row">
<select id="planSelect" class="plan-select">
  <option value="free">Free</option>
  <option value="basic">Basic ₹99</option>
  <option value="pro">Pro ₹199</option>
</select>

<div class="token-pill">∞ AI</div>
</div>

<textarea id="codeInput" class="code-input" placeholder="Paste error here..."></textarea>

<div class="btn-row">
<button class="btn btn-explain" onclick="handleAction('explain')">Explain</button>
<button class="btn btn-fix" onclick="handleAction('fix')">Fix Code</button>
</div>

<div class="output-box" id="outputBox"></div>

</div>
</main>

<section id="docs">
<h2>Docs</h2>
<p>Paste error → click → get fix instantly</p>
</section>

<section id="pricing">
<h2>Pricing</h2>
<p>Free: 3/day</p>
<p>Basic: ₹99</p>
<p>Pro: Unlimited</p>
</section>

<footer class="footer">
<span>© 2026 BugFix AI 🚀</span>
</footer>

</div>

<!-- LOGIN -->
<div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
<div style="background:#111; padding:30px; border-radius:12px;">
<h3>Login</h3>
<input placeholder="Email"><br><br>
<input placeholder="Password"><br><br>
<button onclick="closeLogin()">Close</button>
</div>
</div>

<!-- LOADING -->
<div id="loadingOverlay" class="loading-overlay">
<div class="loader-ring"></div>
<p id="loaderText">Thinking…</p>
</div>

<script src="script.js"></script>

</body>
</html>
<div class="cursor-glow"></div>
