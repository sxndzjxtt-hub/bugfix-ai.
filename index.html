<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BugFix AI</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="page-wrapper">

<!-- NAVBAR -->
<header class="top-bar">
  <div class="logo-mark">🐞 BugFix AI</div>
  <nav class="top-nav">
    <a href="#docs">Docs</a>
    <a href="#pricing">Pricing</a>
    <a href="#" onclick="openLogin()">Sign In</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Fix coding errors instantly 🚀</h1>
</section>

<!-- MAIN -->
<div class="glass-card">

<select id="planSelect">
  <option value="free">Free</option>
  <option value="basic">Basic</option>
  <option value="pro">Pro</option>
</select>

<textarea id="codeInput" placeholder="Paste error here..."></textarea>

<button onclick="handleAction('explain')">Explain</button>
<button onclick="handleAction('fix')">Fix</button>

<div id="outputBox">Output will appear here...</div>

</div>

<!-- DOCS -->
<section id="docs">
  <h2>Docs</h2>
  <p>Paste error → click → get fix</p>
</section>

<!-- PRICING -->
<section id="pricing">
  <h2>Pricing</h2>
  <p>Free: 3 uses</p>
  <p>Basic: ₹99</p>
  <p>Pro: Unlimited</p>
</section>

<!-- LOGIN POPUP -->
<div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center;">
  <div style="background:#111; padding:20px;">
    <h3>Login</h3>
    <input placeholder="Email"><br><br>
    <input placeholder="Password" type="password"><br><br>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay" style="display:none; position:fixed; inset:0; background:black; color:white; justify-content:center; align-items:center;">
Loading...
</div>

<script>

// ✅ API
const API = "https://bugfix-backend-1.onrender.com";
const userId = localStorage.getItem("user") || Date.now();
localStorage.setItem("user", userId);

// 🚀 MAIN FUNCTION
function handleAction(type) {
  const input = document.getElementById("codeInput").value;
  const plan = document.getElementById("planSelect").value;

  if (!input.trim()) {
    alert("Enter something 😅");
    return;
  }

  document.getElementById("loadingOverlay").style.display = "flex";

  const endpoint = type === "explain" ? "/api/explain" : "/api/fix";

  fetch(API + endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ error: input, userId, plan })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("loadingOverlay").style.display = "none";
    document.getElementById("outputBox").innerText = data.result || data.error;
  })
  .catch(() => {
    document.getElementById("loadingOverlay").style.display = "none";
    alert("Error 😭");
  });
}

// 🔐 LOGIN
function openLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function closeLogin() {
  document.getElementById("loginModal").style.display = "none";
}

</script>

</body>
</html>
